 name: Auto Deploy to EC2 via Nginx

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TARGET_URL: "http://13.218.24.66"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            sudo apt update -y
            sudo apt install -y nginx git

            sudo systemctl start nginx
            sudo systemctl enable nginx

            sudo rm -f /var/www/html/index.nginx-debian.html

            if [ ! -d "/var/www/html/.git" ]; then
              sudo rm -rf /var/www/html/*
              sudo git clone https://github.com/${{ github.repository }} /var/www/html
            else
              cd /var/www/html
              sudo git pull origin main
            fi

            sudo chown -R www-data:www-data /var/www/html
            sudo systemctl reload nginx

      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          fail_action: false
          target: ${{ env.TARGET_URL }}
          cmd_options: "-a"

      - name: Rename ZAP Report with Timestamp
        run: |
          timestamp=$(date +%Y%m%d_%H%M%S)
          if [ -f report_html.html ]; then
            mv report_html.html zap_report_${timestamp}.html
          fi

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: "*.html"
